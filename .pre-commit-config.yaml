repos:
  - repo: local
    hooks:
      # Linters run from the locally-installed toolchain (requirements.txt) — no
      # network fetch, so this works on an air-gapped intranet.
      - id: black
        name: black
        entry: black
        language: system
        types: [python]
      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        args: ["."]
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        types: [python]
      # The offline validator is this repo's test: spec + marketplace registration.
      - id: validate-skills
        name: validate skills
        entry: python skill-author/scripts/validate_skill.py
        language: system
        pass_filenames: false
        always_run: true
      # The wiki-doc-author gate scripts self-check their logic (stdlib, no deps).
      - id: openapi-completeness-self-test
        name: openapi_completeness self-test
        entry: python wiki-doc-author/scripts/openapi_completeness.py --self-test
        language: system
        pass_filenames: false
        always_run: true
      - id: lint-frontmatter-self-test
        name: lint_frontmatter self-test
        entry: python wiki-doc-author/scripts/lint_frontmatter.py --self-test
        language: system
        pass_filenames: false
        always_run: true
